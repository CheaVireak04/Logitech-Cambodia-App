<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRAVASTAR DISTRIBUTOR | V7 PRO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* CORE VARIABLES - CYBERPUNK / GRAVASTAR STYLE */
        :root { 
            --bg-main: #050505; 
            --bg-sec: #0a0a0c; 
            --bg-card: rgba(20, 20, 25, 0.6); 
            --border: #2a2a35; 
            --text-main: #ffffff; 
            --text-sec: #8a8a9d; 
            --neon-accent: #ccff00; /* GravaStar Yellow/Green */
            --neon-glow: 0 0 15px rgba(204, 255, 0, 0.4);
            --glass-blur: blur(12px);
        }
        
        /* Forces dark mode aesthetics */
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
        }

        .neon-border { border: 1px solid var(--border); transition: all 0.3s ease; }
        .neon-border:focus-within, .neon-border:hover { border-color: var(--neon-accent); box-shadow: var(--neon-glow); }

        .neon-btn {
            background: var(--neon-accent);
            color: #000;
            box-shadow: 0 0 10px rgba(204, 255, 0, 0.2);
            transition: all 0.2s ease;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: var(--neon-glow); }

        .flying-item { position: fixed; z-index: 9999; pointer-events: none; width: 60px; height: 60px; object-fit: contain; transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1); filter: drop-shadow(0 10px 15px rgba(204,255,0,0.5)); }
        
        .search-highlight { color: var(--neon-accent); font-weight: 900; }

        .company-box { border: 2px solid var(--border); transition: all 0.2s ease; opacity: 1; background-color: rgba(20,20,25,0.8); cursor: pointer; }
        .company-box.selected { border-color: var(--neon-accent); background-color: rgba(204, 255, 0, 0.1); box-shadow: var(--neon-glow); }

        .view-section { position: absolute; width: 100%; top: 0; left: 0; opacity: 0; visibility: hidden; transform: translateY(15px) scale(0.98); transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s; height: 0; overflow: hidden; }
        .view-section.active { position: relative; opacity: 1; visibility: visible; transform: translateY(0) scale(1); height: auto; overflow: visible; min-height: 80vh; }

        /* CUSTOM SLIDER */
        .dual-slider-container { position: relative; width: 100%; height: 4px; background-color: var(--border); border-radius: 4px; margin-top: 18px; margin-bottom: 12px; }
        .dual-slider-track { position: absolute; height: 100%; background-color: var(--neon-accent); border-radius: 4px; z-index: 1; pointer-events: none; box-shadow: var(--neon-glow); }
        .dual-slider { position: absolute; width: 100%; top: -8px; appearance: none; -webkit-appearance: none; background: transparent; pointer-events: none; z-index: 3; margin: 0; padding: 0; }
        .dual-slider:focus { outline: none; }
        .dual-slider::-webkit-slider-thumb { pointer-events: auto; appearance: none; -webkit-appearance: none; width: 22px; height: 22px; border-radius: 0%; background-color: var(--neon-accent); cursor: pointer; border: 2px solid #000; box-shadow: 0 0 10px rgba(204,255,0,0.5); position: relative; z-index: 5; transition: transform 0.1s; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 20px)); }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { premiumBlack: 'var(--bg-main)', premiumDark: 'var(--bg-sec)', premiumCard: 'var(--bg-card)', premiumBorder: 'var(--border)', premiumWhite: 'var(--text-main)', premiumGray: 'var(--text-sec)', neon: 'var(--neon-accent)' } } } }
    </script>
</head>

<body class="bg-premiumBlack text-premiumWhite antialiased pb-24 select-none hide-scroll overflow-x-hidden">

    <header class="fixed top-0 w-full glass-panel z-50 px-4 py-4 flex justify-between items-center border-b-0">
        <div class="flex items-center gap-4">
            <button onclick="app.toggleLeftPanel()" class="text-premiumWhite active:scale-90 transition-transform">
                <svg class="w-6 h-6 stroke-[1.5px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div onclick="app.navigate('home'); app.setCategory('home');" class="cursor-pointer flex items-baseline gap-1 active:opacity-50 transition-opacity">
                <h1 class="text-xl font-tech font-bold tracking-[0.1em] uppercase">GRAVA<span class="text-neon">STAR</span></h1>
            </div>
        </div>
        <button onclick="app.togglePanel()" class="text-premiumWhite active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </button>
    </header>

    <main id="app-container" class="pt-24 px-4 relative max-w-2xl mx-auto">
        
        <section id="view-home" class="view-section active">
            <div id="hero-banner-container">
                <div class="relative w-full h-52 rounded-2xl overflow-hidden mb-6 border border-premiumBorder shadow-2xl flex items-center justify-center bg-[#0a0a0c]">
                    <div class="absolute inset-0 bg-gradient-to-br from-[#1a1a24] to-[#050505]"></div>
                    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(var(--neon-accent) 1px, transparent 1px); background-size: 20px 20px;"></div>
                    <div class="relative z-10 text-center px-4 border border-white/10 p-6 backdrop-blur-md rounded-xl">
                        <span class="text-neon text-[10px] font-tech font-bold uppercase tracking-widest mb-2 inline-block shadow-md border border-neon px-2 py-1">OFFICIAL DISTRIBUTOR</span>
                        <h2 class="text-3xl font-tech font-black uppercase tracking-widest mb-1 text-white drop-shadow-[0_0_10px_rgba(204,255,0,0.3)]">BE COOL PLAY IT</h2>
                        <p class="text-[10px] text-premiumGray font-bold uppercase tracking-widest leading-relaxed mt-2">Sci-Fi inspired tech & gaming gear.</p>
                    </div>
                </div>
                
                <div class="mb-8 space-y-4">
                    <div class="relative z-20 neon-border rounded-xl">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" oninput="app.handleSearch(event)" placeholder="Search mecha, audio, gaming..." class="w-full bg-transparent text-premiumWhite text-sm py-4 pl-12 pr-4 focus:outline-none placeholder-premiumGray">
                        <div id="search-suggestions" class="absolute w-full glass-panel border-t-0 mt-2 rounded-xl shadow-2xl hidden flex-col overflow-hidden max-h-48 overflow-y-auto"></div>
                    </div>

                    <div class="glass-panel rounded-xl p-4">
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-premiumGray font-tech">Price Range</label>
                            <span id="priceValue" class="text-sm font-tech font-bold text-neon tracking-widest">$0.00 — $1000.00</span>
                        </div>
                        <div class="dual-slider-container">
                            <div id="slider-track" class="dual-slider-track" style="left: 0%; right: 0%;"></div>
                            <input type="range" id="minPriceRange" min="0" max="1000" value="0" oninput="app.handlePriceFilter('min')" class="dual-slider">
                            <input type="range" id="maxPriceRange" min="0" max="1000" value="1000" oninput="app.handlePriceFilter('max')" class="dual-slider">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-end mb-4 mt-2">
                <h3 id="category-title" class="text-sm font-tech font-bold uppercase tracking-widest text-premiumWhite drop-shadow-[0_0_5px_rgba(255,255,255,0.3)]">Hardware Database</h3>
                <span class="text-[10px] text-neon uppercase tracking-widest flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-neon animate-pulse"></div> Live</span>
            </div>
            <div id="product-grid" class="grid grid-cols-2 gap-4 pb-10"></div>
        </section>

        <section id="view-product" class="view-section">
            <button onclick="app.navigate('home')" class="mb-6 flex items-center gap-2 text-neon uppercase text-xs font-tech font-bold tracking-widest transition-colors focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Back to Database
            </button>
            <div id="product-detail-content"></div>
        </section>

        <section id="view-cart" class="view-section">
            <h2 class="text-2xl font-tech font-bold uppercase tracking-widest mb-6 border-b border-premiumBorder pb-4 text-center">Equipment Cart</h2>
            <div id="cart-content"></div>
        </section>
    </main>

    <div id="order-modal" class="fixed inset-0 bg-black/90 z-[200] hidden items-center justify-center p-4 backdrop-blur-md transition-opacity opacity-0 overflow-y-auto">
        <div class="glass-panel w-full max-w-md rounded-2xl p-6 shadow-[0_0_30px_rgba(204,255,0,0.1)] transform scale-95 transition-transform my-auto max-h-[90vh] overflow-y-auto hide-scroll" id="order-modal-content">
            <div class="flex justify-between items-center mb-6 border-b border-premiumBorder pb-4">
                <h3 class="font-tech font-bold text-xl uppercase tracking-widest text-neon">Transmission Link</h3>
                <button onclick="app.closeOrderSummary()" class="text-premiumGray hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-premiumGray uppercase font-bold tracking-widest block mb-2 font-tech">Delivery Protocol <span class="text-neon">*</span></label>
                    <select id="modal-delivery" onchange="app.handleDeliveryChange()" class="w-full glass-panel text-white text-sm p-4 rounded-xl outline-none appearance-none cursor-pointer neon-border">
                            <option value="" disabled selected>Establish connection method...</option>
                            <option value="Standard Delivery (1-2 days)">Standard Freight (1–2 days)</option>
                            <option value="GrabExpress (Phnom Penh)">GrabExpress (Phnom Penh Sector)</option>
                            <option value="Store Pickup">Local Cache Pickup</option>
                    </select>
                    <p id="delivery-error" class="text-red-500 text-[10px] font-bold uppercase mt-2 hidden tracking-wider">⚠️ Protocol required</p>
                </div>

                <div id="grab-fields" class="hidden space-y-4 p-4 glass-panel rounded-xl">
                    <div>
                        <label class="text-[10px] text-premiumGray uppercase font-bold tracking-widest block mb-2 font-tech">Comlink (Phone) <span class="text-neon">*</span></label>
                        <input type="tel" id="grab-phone" placeholder="012 345 678" oninput="app.clearGrabPhoneError()" class="w-full bg-transparent border border-premiumBorder text-white text-sm p-3 rounded-xl outline-none neon-border">
                    </div>
                </div>
                </div>

            <button onclick="app.submitFinalOrder()" class="w-full neon-btn font-tech font-bold uppercase tracking-widest text-sm py-4 rounded-xl mt-8 flex justify-center items-center gap-2">
                INITIATE TRANSFER
            </button>
        </div>
    </div>

    <div id="left-panel-overlay" onclick="app.toggleLeftPanel()" class="fixed inset-0 bg-black/80 z-[90] hidden backdrop-blur-sm transition-opacity opacity-0"></div>
    <div id="left-panel" class="fixed inset-y-0 left-0 w-72 max-w-[85%] glass-panel border-r border-premiumBorder z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col shadow-[10px_0_30px_rgba(0,0,0,0.8)]">
        <div class="p-5 border-b border-premiumBorder flex justify-between items-center bg-black/50">
            <span class="font-tech font-bold uppercase tracking-widest text-sm text-neon mx-auto">Systems Menu</span>
        </div>
        <div class="p-4 flex-1 overflow-y-auto hide-scroll space-y-2 mt-2">
            <button onclick="app.setCategory('home')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">🌐</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">All Systems</span></button>
            <button onclick="app.setCategory('speakers')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">🔊</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Speakers</span></button>
            <button onclick="app.setCategory('earbuds')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">🎧</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Earbuds (TWS)</span></button>
            <button onclick="app.setCategory('mice')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">🖱️</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Gaming Mice</span></button>
            <button onclick="app.setCategory('keyboards')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">⌨️</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Keyboards</span></button>
            <button onclick="app.setCategory('power')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">⚡</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Power & Hubs</span></button>
            <button onclick="app.setCategory('accessories')" class="w-full text-left flex items-center gap-4 p-4 rounded-xl glass-panel hover:border-neon active:scale-95 transition-all"><span class="text-lg">📦</span><span class="font-bold text-xs uppercase tracking-widest text-premiumWhite">Accessories</span></button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full glass-panel z-40 pb-safe border-t-0 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
        <div class="flex justify-around items-center p-4 max-w-md mx-auto">
            <button onclick="app.navigate('home'); app.setCategory('home');" id="nav-home" class="flex flex-col items-center text-neon transition-colors focus:outline-none">
                <svg class="w-6 h-6 mb-1 drop-shadow-[0_0_5px_rgba(204,255,0,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest font-tech">Database</span>
            </button>
            <button onclick="app.navigate('cart')" id="nav-cart" class="flex flex-col items-center text-premiumGray hover:text-neon transition-colors relative focus:outline-none">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest font-tech">Cart</span>
                <span id="cart-badge" class="absolute -top-1 right-1 bg-neon text-black text-[10px] font-black w-[18px] h-[18px] rounded-full flex items-center justify-center hidden shadow-[0_0_10px_rgba(204,255,0,0.8)] transition-colors">0</span>
            </button>
        </div>
    </nav>
    </body>
</html>
