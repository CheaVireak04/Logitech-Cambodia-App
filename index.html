<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logitech Cambodia</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Adapt to Telegram's Native Theme */
        body {
            background-color: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .tg-card {
            background-color: var(--tg-theme-secondary-bg-color, #16213e);
        }
        .logi-blue { color: #00b8fc; }
        .bg-logi-blue { background-color: #00b8fc; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex justify-between items-center border-b border-gray-700">
        <h1 class="text-xl font-bold tracking-wider uppercase logi-blue">Logitech KH</h1>
        <div class="flex space-x-3">
            <span class="text-xl">🔍</span>
            <span class="text-xl">🛒</span>
        </div>
    </header>

    <div class="m-4 rounded-xl bg-gradient-to-r from-gray-900 to-gray-800 border border-gray-700 overflow-hidden relative shadow-lg">
        <div class="p-6">
            <span class="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded uppercase">New Arrival</span>
            <h2 class="text-2xl font-bold mt-2">G PRO X SUPERLIGHT</h2>
            <p class="text-sm text-gray-400 mt-1">Zero Opposition.</p>
            <button class="mt-4 bg-logi-blue text-black font-bold py-2 px-4 rounded-lg w-full" onclick="tg.showAlert('Opening G PRO X SUPERLIGHT Page')">
                View Product
            </button>
        </div>
    </div>

    <div class="px-4">
        <h3 class="text-lg font-bold mb-3">Categories</h3>
        <div class="grid grid-cols-4 gap-2 text-center text-xs">
            <div class="tg-card p-2 rounded-lg flex flex-col items-center justify-center h-16 shadow">
                <span class="text-2xl mb-1">🎮</span> Mice
            </div>
            <div class="tg-card p-2 rounded-lg flex flex-col items-center justify-center h-16 shadow">
                <span class="text-2xl mb-1">⌨️</span> Keys
            </div>
            <div class="tg-card p-2 rounded-lg flex flex-col items-center justify-center h-16 shadow">
                <span class="text-2xl mb-1">🎧</span> Audio
            </div>
            <div class="tg-card p-2 rounded-lg flex flex-col items-center justify-center h-16 shadow">
                <span class="text-2xl mb-1">📷</span> Cams
            </div>
        </div>
    </div>

    <div class="p-4 mt-2">
        <h3 class="text-lg font-bold mb-3">Trending Gear</h3>
        <div class="grid grid-cols-2 gap-4">
            <div class="tg-card rounded-xl p-3 shadow border border-gray-800">
                <div class="h-24 bg-gray-800 rounded flex items-center justify-center mb-2">
                    <span class="text-4xl">🖱️</span>
                </div>
                <h4 class="font-bold text-sm truncate">G502 X PLUS</h4>
                <p class="text-logi-blue font-bold mt-1">$159.00</p>
                <button class="mt-2 w-full bg-gray-700 hover:bg-gray-600 text-white text-xs py-1.5 rounded" onclick="tg.HapticFeedback.impactOccurred('light');">Add to Cart</button>
            </div>
            <div class="tg-card rounded-xl p-3 shadow border border-gray-800">
                <div class="h-24 bg-gray-800 rounded flex items-center justify-center mb-2">
                    <span class="text-4xl">🎧</span>
                </div>
                <h4 class="font-bold text-sm truncate">G733 Wireless</h4>
                <p class="text-logi-blue font-bold mt-1">$129.00</p>
                <button class="mt-2 w-full bg-gray-700 hover:bg-gray-600 text-white text-xs py-1.5 rounded" onclick="tg.HapticFeedback.impactOccurred('light');">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens app to full height
        tg.ready();  // Tells Telegram the app is loaded
        
        // Setup Main Button (Example)
        tg.MainButton.setText("VIEW PROMOTIONS");
        tg.MainButton.show();
        tg.MainButton.onClick(function() {
            tg.showAlert("Navigating to Deals Center...");
        });
    </script>
</body>
</html>
